<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Padmalaya Textiles — Design Concepts v3 (Philosophy Mashups)</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Space+Grotesk:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&family=Instrument+Serif:ital@0;1&family=DM+Sans:wght@400;500;600;700&family=Syne:wght@400;500;600;700;800&family=Bebas+Neue&family=Caveat:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #0a0a0a; }
@keyframes marquee { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }
@keyframes pulse { 0%,100% { opacity: 0.5; } 50% { opacity: 1; } }
@keyframes float { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }
@keyframes gradientMove { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
@keyframes rotate { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
@keyframes dash { to { stroke-dashoffset: 0; } }
@keyframes wiggle { 0%,100% { transform: rotate(-1deg); } 50% { transform: rotate(1deg); } }
.mq-track { display: flex; animation: marquee 20s linear infinite; white-space: nowrap; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState } = React;

const nav = ["Home", "Products", "About", "Process", "Contact"];
const products = [
  { name: "Classic Terry Bath Towel", size: "70×140 cm", weight: "500 GSM", tag: "Bestseller", desc: "Our signature bath towel — plush, absorbent, and built to last through hundreds of washes." },
  { name: "Premium Face Towel Set", size: "30×30 cm", weight: "450 GSM", tag: "New", desc: "Ultra-soft face towels, gentle on skin. Perfect for hotels and spa settings." },
  { name: "Luxury Hand Towel", size: "40×70 cm", weight: "550 GSM", tag: "Premium", desc: "Extra-thick hand towels with double-loop terry weave for maximum absorbency." },

  { name: "Terry Kitchen Napkin", size: "45×65 cm", weight: "350 GSM", tag: "Popular", desc: "Durable terry napkins for commercial kitchens. Lint-free, quick-dry cotton." },

const designs = [
  {
    id: 11, name: "Bento Luxe",
    philosophy: "Bento Grid + Glassmorphism + Minimalism",

  },
  {
    id: 12, name: "Raw Thread",
    philosophy: "Neobrutalism + Editorial Typography + Flat Color",
    description: "Thick black borders, raw exposed grids, punchy flat accent colors (electric yellow + hot pink), and massive editorial typography. Intentionally 'undesigned' but highly intentional. Breaks every 'luxury = subtle' rule and stands out on every screen. Think SSENSE meets a zine.",
  },
  {
    id: 13, name: "Helvetica Mill",
    philosophy: "Swiss Style + Constructivism + Grid Precision",
    description: "Pure Swiss international typographic style — strict grid, Helvetica-inspired sans-serif, asymmetric balance, bold red accent on cream. Information hierarchy through size, weight, and position alone. No gradients, no shadows, no tricks. Typography IS the design. Inspired by Müller-Brockmann.",
  },
  {
    id: 14, name: "Deco Atelier",
    philosophy: "Art Deco + Neumorphism + Retro Luxury",
    description: "1920s art deco geometric patterns (chevrons, sunbursts, stepped borders) combined with soft neumorphic depth. Rich forest green + champagne gold on a warm stone background. Feels like a luxury hotel lobby designed by Gatsby's architect — opulent but tactile.",
  },
  {
    id: 15, name: "Sketchbook",
    philosophy: "Hand-Drawn + Flat Design + Editorial Warmth",
    description: "Hand-drawn SVG borders, doodle underlines, and sketch-style icons on a warm paper-textured background. Clean flat color fills with wobbly outlines. Feels personal, artisanal, and crafted — like opening a designer's notebook. The imperfection IS the charm.",

/* ═══════════════════════════════════════════
   DESIGN 11 — BENTO LUXE
   Bento Grid + Glassmorphism + Minimalism
   ═══════════════════════════════════════════ */
function Design11() {
  const g = "rgba(255,255,255,0.12)";
  const gb = "rgba(255,255,255,0.04)";
  const acc = "#E8A87C";
  const acc2 = "#85C9CF";
  return (
    <div style={{ background: "linear-gradient(160deg, #1A1423 0%, #1E2432 40%, #1A2828 100%)", color: "#fff", fontFamily: "'Space Grotesk', sans-serif", minHeight: "100%", padding: 20 }}>
      {/* Nav */}
      <nav style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "16px 28px", background: g, backdropFilter: "blur(20px)", border: "1px solid rgba(255,255,255,0.06)", borderRadius: 16, marginBottom: 20 }}>
        <div style={{ fontSize: 20, fontWeight: 700, letterSpacing: 3 }}>PADMALAYA</div>

      {/* BENTO GRID */}
      <div style={{ display: "grid", gridTemplateColumns: "repeat(4, 1fr)", gridTemplateRows: "auto", gap: 12, maxWidth: 1200, margin: "0 auto" }}>

        {/* Hero — spans 2 cols, 2 rows */}
        <div style={{ gridColumn: "1 / 3", gridRow: "1 / 3", background: g, backdropFilter: "blur(24px)", border: "1px solid rgba(255,255,255,0.06)", borderRadius: 20, padding: "52px 44px", display: "flex", flexDirection: "column", justifyContent: "center", position: "relative", overflow: "hidden" }}>
          <div style={{ position: "absolute", top: -60, right: -60, width: 200, height: 200, borderRadius: "50%", background: `radial-gradient(circle, ${acc}15, transparent)` }} />
          <span style={{ fontSize: 12, color: acc, letterSpacing: 3, textTransform: "uppercase", marginBottom: 20, fontWeight: 500 }}>Premium Cotton Manufacturer</span>
          <h1 style={{ fontFamily: "'Instrument Serif', serif", fontSize: 52, fontWeight: 400, lineHeight: 1.1, marginBottom: 20 }}>Woven with<br/><span style={{ fontStyle: "italic", color: acc }}>Intention</span></h1>
          <p style={{ fontSize: 15, color: "rgba(255,255,255,0.5)", lineHeight: 1.7, maxWidth: 380, marginBottom: 32 }}>India's finest terry towels — crafted for hotels, spas, and discerning brands worldwide.</p>
          <div style={{ display: "flex", gap: 12 }}>
            <button style={{ background: acc, color: "#1A1423", border: "none", padding: "14px 32px", fontSize: 14, fontWeight: 600, cursor: "pointer", borderRadius: 12 }}>Explore</button>
            <button style={{ background: gb, backdropFilter: "blur(12px)", color: "#fff", border: "1px solid rgba(255,255,255,0.08)", padding: "14px 32px", fontSize: 14, cursor: "pointer", borderRadius: 12 }}>Our Story</button>
          </div>
        </div>

        {/* Stat boxes */}
        {[{ n: "25+", l: "Years", bg: acc }, { n: "500+", l: "Hotels", bg: acc2 }].map((s, i) => (
          <div key={i} style={{ background: g, backdropFilter: "blur(20px)", border: "1px solid rgba(255,255,255,0.06)", borderRadius: 20, padding: 28, display: "flex", flexDirection: "column", justifyContent: "center", alignItems: "center", textAlign: "center" }}>
            <div style={{ fontSize: 40, fontWeight: 700, color: s.bg, fontFamily: "'Instrument Serif', serif" }}>{s.n}</div>
            <div style={{ fontSize: 12, color: "rgba(255,255,255,0.4)", letterSpacing: 2, marginTop: 4, textTransform: "uppercase" }}>{s.l}</div>
          </div>
        ))}

        {[{ n: "100%", l: "Indian Cotton", bg: "#C9A0DC" }, { n: "50L+", l: "Towels/Year", bg: "#A0DC8B" }].map((s, i) => (
          <div key={i} style={{ background: g, backdropFilter: "blur(20px)", border: "1px solid rgba(255,255,255,0.06)", borderRadius: 20, padding: 28, display: "flex", flexDirection: "column", justifyContent: "center", alignItems: "center", textAlign: "center" }}>
            <div style={{ fontSize: 40, fontWeight: 700, color: s.bg, fontFamily: "'Instrument Serif', serif" }}>{s.n}</div>
            <div style={{ fontSize: 12, color: "rgba(255,255,255,0.4)", letterSpacing: 2, marginTop: 4, textTransform: "uppercase" }}>{s.l}</div>

        {/* Featured product — spans 2 cols */}

            <h3 style={{ fontFamily: "'Instrument Serif', serif", fontSize: 26, fontWeight: 400, margin: "8px 0 10px" }}>Hotel Collection Bath Sheet</h3>
            <p style={{ fontSize: 13, color: "rgba(255,255,255,0.45)", maxWidth: 300 }}>600 GSM · 90×180 cm — Our flagship product for 5-star hospitality.</p>
          </div>
          <button style={{ background: acc, color: "#1A1423", border: "none", padding: "14px 32px", fontSize: 13, fontWeight: 600, cursor: "pointer", borderRadius: 12, whiteSpace: "nowrap" }}>Enquire →</button>
        </div>

        {/* Process — spans 2 cols */}
        <div style={{ gridColumn: "3 / 5", background: g, backdropFilter: "blur(20px)", border: "1px solid rgba(255,255,255,0.06)", borderRadius: 20, padding: "32px 36px" }}>
          <span style={{ fontSize: 11, color: acc2, letterSpacing: 2, textTransform: "uppercase" }}>Our Process</span>
          <div style={{ display: "grid", gridTemplateColumns: "repeat(3, 1fr)", gap: 16, marginTop: 20 }}>

              <div key={i} style={{ background: gb, borderRadius: 12, padding: "16px 14px", textAlign: "center" }}>
                <div style={{ fontSize: 20, fontWeight: 700, color: acc2, marginBottom: 4 }}>{String(i+1).padStart(2,'0')}</div>
                <div style={{ fontSize: 11, color: "rgba(255,255,255,0.45)" }}>{s}</div>
              </div>
            ))}
          </div>
        </div>

        {/* Product cards — 4 across */}
        {products.slice(0, 4).map((p, i) => (
          <div key={i} style={{ background: g, backdropFilter: "blur(20px)", border: "1px solid rgba(255,255,255,0.06)", borderRadius: 20, padding: 24, display: "flex", flexDirection: "column" }}>
            <div style={{ width: "100%", height: 100, background: gb, borderRadius: 12, marginBottom: 16, display: "flex", alignItems: "center", justifyContent: "center" }}>
              <span style={{ fontSize: 24, opacity: 0.3, color: [acc, acc2, "#C9A0DC", "#A0DC8B"][i] }}>✦</span>
            </div>
            <span style={{ fontSize: 10, color: [acc, acc2, "#C9A0DC", "#A0DC8B"][i], letterSpacing: 1.5, textTransform: "uppercase", fontWeight: 600 }}>{p.tag}</span>

            <span style={{ fontSize: 11, color: "rgba(255,255,255,0.35)", marginBottom: "auto" }}>{p.size} · {p.weight}</span>
            <span style={{ fontSize: 12, color: acc, cursor: "pointer", marginTop: 12 }}>Enquire →</span>

        <div style={{ gridColumn: "1 / 5", background: `linear-gradient(135deg, ${acc}20, ${acc2}15)`, backdropFilter: "blur(24px)", border: "1px solid rgba(255,255,255,0.06)", borderRadius: 20, padding: "44px 48px", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
          <div>
            <h2 style={{ fontFamily: "'Instrument Serif', serif", fontSize: 32, fontWeight: 400, marginBottom: 8 }}>Ready to <span style={{ fontStyle: "italic", color: acc }}>partner</span>?</h2>
            <p style={{ fontSize: 14, color: "rgba(255,255,255,0.45)" }}>Custom manufacturing from 500 pieces. Private labeling, bespoke weaves, worldwide delivery.</p>
          </div>
          <button style={{ background: acc, color: "#1A1423", border: "none", padding: "16px 44px", fontSize: 15, fontWeight: 600, cursor: "pointer", borderRadius: 12 }}>Start Conversation</button>
        </div>
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════════
   DESIGN 12 — RAW THREAD
   Neobrutalism + Editorial + Flat Color
   ═══════════════════════════════════════════ */
function Design12() {
  const y = "#EBFF00";
  const pk = "#FF5C8A";
  const bg = "#FFFEF5";
  const bk = "#111111";
  const br = "3px solid " + bk;
  return (
    <div style={{ background: bg, color: bk, fontFamily: "'Space Grotesk', sans-serif", minHeight: "100%" }}>
      {/* Nav — thick border bottom */}
      <nav style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "16px 40px", borderBottom: br }}>
        <div style={{ fontFamily: "'Bebas Neue', sans-serif", fontSize: 32, letterSpacing: 4 }}>PADMALAYA</div>
        <div style={{ display: "flex", gap: 20 }}>{nav.map(n => <span key={n} style={{ fontSize: 14, cursor: "pointer", fontWeight: 600, textTransform: "uppercase" }}>{n}</span>)}</div>
        <button style={{ background: y, color: bk, border: br, padding: "12px 28px", fontSize: 14, fontWeight: 700, cursor: "pointer", textTransform: "uppercase", boxShadow: "4px 4px 0 " + bk }}>Get Quote</button>
      </nav>

      {/* Hero */}
      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", borderBottom: br }}>
        <div style={{ padding: "64px 48px", borderRight: br }}>
          <div style={{ display: "inline-block", background: pk, color: "#fff", padding: "6px 14px", fontSize: 12, fontWeight: 700, letterSpacing: 2, textTransform: "uppercase", marginBottom: 24, boxShadow: "3px 3px 0 " + bk, border: br }}>MANUFACTURER</div>
          <h1 style={{ fontFamily: "'Syne', sans-serif", fontSize: 72, fontWeight: 800, lineHeight: 0.95, marginBottom: 20, textTransform: "uppercase" }}>
            WE MAKE<br/>
            <span style={{ color: pk }}>DAMN</span><br/>
            GOOD<br/>
            <span style={{ background: y, padding: "0 8px", display: "inline-block" }}>TOWELS.</span>
          </h1>
          <p style={{ fontSize: 16, lineHeight: 1.7, maxWidth: 420, marginBottom: 32, color: "#444" }}>Premium cotton terry — manufactured in India for the world's most demanding brands. No middlemen, no shortcuts.</p>
          <div style={{ display: "flex", gap: 12 }}>
            <button style={{ background: bk, color: bg, border: br, padding: "16px 36px", fontSize: 15, fontWeight: 700, cursor: "pointer", boxShadow: "4px 4px 0 " + pk }}>SEE PRODUCTS →</button>
            <button style={{ background: "transparent", color: bk, border: br, padding: "16px 36px", fontSize: 15, fontWeight: 700, cursor: "pointer" }}>OUR STORY</button>
          </div>
        </div>
        <div style={{ background: y, display: "flex", alignItems: "center", justifyContent: "center", position: "relative" }}>

            <div style={{ fontSize: 13, color: "#444", maxWidth: 200 }}>100% Indian cotton, zero compromise on quality</div>
          </div>
        </div>
      </div>

      {/* Stats strip */}
      <div style={{ display: "grid", gridTemplateColumns: "repeat(4, 1fr)", borderBottom: br }}>
        {[{ n: "25+", l: "YEARS" }, { n: "50L+", l: "TOWELS/YR" }, { n: "500+", l: "CLIENTS" }, { n: "22+", l: "COLOURS" }].map((s, i) => (

      {/* Products */}
      <div style={{ padding: "48px 40px" }}>

                <p style={{ fontSize: 12, color: i === 2 ? "rgba(255,255,255,0.8)" : "#666", lineHeight: 1.6, marginBottom: 16 }}>{p.desc}</p>

        </div>
        <button style={{ background: y, color: bk, border: br, padding: "18px 44px", fontSize: 16, fontWeight: 700, cursor: "pointer", boxShadow: "4px 4px 0 " + pk, whiteSpace: "nowrap" }}>HIT US UP →</button>
      </div>

/* ═══════════════════════════════════════════
   DESIGN 13 — HELVETICA MILL
   Swiss Style + Constructivism + Grid
   ═══════════════════════════════════════════ */
function Design13() {
  const r = "#E63B2E";

    <div style={{ background: bg, color: bk, fontFamily: "'Space Grotesk', sans-serif", minHeight: "100%" }}>
      {/* Nav */}

        <div>
          <h1 style={{ fontSize: 88, fontWeight: 700, lineHeight: 0.92, letterSpacing: -2, textTransform: "uppercase" }}>

            <span style={{ color: r }}>Terry</span><br/>

        </div>
        <div style={{ textAlign: "right" }}>
          <div style={{ fontSize: 80, fontWeight: 700, color: r, lineHeight: 1, fontFamily: "'Space Mono', monospace" }}>25</div>
