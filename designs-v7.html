<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0c0b09}
@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
@keyframes goldFlow{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}
@keyframes breathe{0%,100%{box-shadow:0 0 0 0 rgba(184,155,74,.22)}50%{box-shadow:0 0 0 14px rgba(184,155,74,0)}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
@keyframes marquee{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}
@keyframes fadeInUp{from{opacity:0;transform:translateY(22px)}to{opacity:1;transform:translateY(0)}}
@keyframes lineGrow{from{transform:scaleX(0)}to{transform:scaleX(1)}}
@keyframes scaleIn{from{opacity:0;transform:scale(.96)}to{opacity:1;transform:scale(1)}}
@keyframes pulseSoft{0%,100%{opacity:.55}50%{opacity:1}}
.mq-track{display:flex;animation:marquee 32s linear infinite;white-space:nowrap}
.hover-lift{transition:transform .4s cubic-bezier(.23,1,.32,1),box-shadow .4s cubic-bezier(.23,1,.32,1)}
.hover-lift:hover{transform:translateY(-6px)}
.focus-ring:focus{outline:2px solid #B89B4A;outline-offset:3px}

</head>

<div id="root"></div>
<script type="text/babel">

const nav = ["Home", "Products", "About", "Process", "Contact"];
const products = [
  { name: "Classic Terry Bath Towel", size: "70×140 cm", weight: "500 GSM", tag: "Bestseller", desc: "Plush, absorbent, and built to last through hundreds of washes — our signature weave." },

  {
    id: 33,
    name: "Gilded Deco",
    philosophy: "Art Deco geometry + neumorphic relief · Stone · Espresso · Champagne foil",

/* ─── 31 SILK & SHADOW ─── */

      <div style={{ padding: "56px 48px 40px", display: "grid", gridTemplateColumns: "1.25fr 1fr", gap: 56, alignItems: "center" }}>

          <h1 style={{ fontFamily: "'Italiana', serif", fontSize: 58, fontWeight: 400, lineHeight: 1.05, marginBottom: 20 }}>

    <div style={{ background: mintCream, color: forest, fontFamily: "'Outfit', sans-serif", minHeight: "100%" }}>

    <div style={{ background: stone, color: esp, fontFamily: "'DM Sans', sans-serif", minHeight: "100%" }}>
