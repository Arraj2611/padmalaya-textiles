                <span style={{ fontFamily: "'Playfair Display', serif", fontSize: 56, fontWeight: 700, opacity: 0.04, color: bk }}>{String(i+1).padStart(2,'0')}</span>
              </div>
              <div style={{ padding: "26px 28px 30px" }}>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 12 }}>
                  <span style={{ fontSize: 10, fontWeight: 700, letterSpacing: 2, color: bg, background: bk, padding: "5px 14px", borderRadius: 50, textTransform: "uppercase" }}>{p.tag}</span>
                  <span style={{ fontSize: 11, color: "#B0A89E" }}>{p.weight}</span>
                </div>
                <h3 style={{ fontFamily: "'Playfair Display', serif", fontSize: 18, fontWeight: 600, marginBottom: 10 }}>{p.name}</h3>
                <p style={{ fontSize: 12, color: "#7A746C", lineHeight: 1.7, marginBottom: 20 }}>{p.desc}</p>
                <button style={{ background: "transparent", color: bk, border: `1px solid ${bk}20`, padding: "12px 24px", fontSize: 12, fontWeight: 600, cursor: "pointer", width: "100%", letterSpacing: 1, textTransform: "uppercase", borderRadius: 50, transition: "all 0.3s" }}>Enquire →</button>
              </div>
            </div>
          ))}
        </div>
      </div>

      {/* CTA */}
      <div style={{ margin: "0 56px 56px", display: "grid", gridTemplateColumns: "1.8fr 1fr", borderRadius: 24, overflow: "hidden" }}>
        <div style={{ background: bk, color: bg, padding: "60px 56px" }}>
          <div style={{ width: 40, height: 2, background: gold, marginBottom: 28 }} />
          <h2 style={{ fontFamily: "'Playfair Display', serif", fontSize: 34, fontWeight: 700, marginBottom: 14, lineHeight: 1.15 }}>Custom manufacturing,<br/>uncompromising <span style={{ color: gold }}>quality</span></h2>
          <p style={{ fontSize: 15, opacity: 0.4, marginBottom: 36 }}>Private labeling · Bespoke weaves · Min. 500 pieces · Worldwide delivery</p>
          <button style={{ background: gold, color: bk, border: "none", padding: "18px 44px", fontSize: 13, fontWeight: 700, cursor: "pointer", letterSpacing: 1, textTransform: "uppercase", borderRadius: 50 }}>Begin Conversation →</button>
        </div>
        <div style={{ background: gold, display: "flex", flexDirection: "column", justifyContent: "center", alignItems: "center", textAlign: "center", padding: "40px 32px" }}>
          <div style={{ fontFamily: "'Playfair Display', serif", fontSize: 56, fontWeight: 700, color: bk }}>500+</div>
          <div style={{ fontSize: 11, letterSpacing: 3, marginTop: 10, textTransform: "uppercase", color: bk, opacity: 0.6, fontWeight: 600 }}>Global Hotel Partners</div>
        </div>
      </div>
    </div>
  );
}

const renderers = [Design21, Design22, Design23, Design24, Design25];

function App() {
  const [active, setActive] = useState(0);
  const d = designs[active];
  return (
    <div style={{ fontFamily: "'DM Sans', sans-serif", background: "#0a0a0a", color: "#fff", minHeight: "100vh" }}>
      <div style={{ position: "sticky", top: 0, zIndex: 100, background: "rgba(10,10,10,0.95)", backdropFilter: "blur(12px)", borderBottom: "1px solid rgba(255,255,255,0.06)", padding: "0 24px" }}>
        <div style={{ display: "flex", alignItems: "center", gap: 6, maxWidth: 1300, margin: "0 auto", height: 56 }}>
          <span style={{ fontSize: 12, color: "rgba(255,255,255,0.35)", marginRight: 10, letterSpacing: 1.5 }}>DESIGN:</span>
          {designs.map((dd, i) => (
            <button key={i} onClick={() => setActive(i)}
              style={{ background: active === i ? "rgba(255,255,255,0.1)" : "transparent", color: active === i ? "#fff" : "rgba(255,255,255,0.4)", border: active === i ? "1px solid rgba(255,255,255,0.15)" : "1px solid transparent", padding: "6px 14px", fontSize: 12, cursor: "pointer", borderRadius: 6, transition: "all 0.2s", whiteSpace: "nowrap" }}>
              {dd.id}. {dd.name}
            </button>
          ))}
        </div>
      </div>
      <div style={{ maxWidth: 1300, margin: "0 auto", padding: "20px 24px 14px" }}>
        <h2 style={{ fontSize: 22, fontWeight: 600, marginBottom: 4 }}>{d.name}</h2>
        <p style={{ fontSize: 13, color: "rgba(255,255,255,0.35)", marginBottom: 6 }}>{d.philosophy}</p>
        <p style={{ fontSize: 13, color: "rgba(255,255,255,0.55)", maxWidth: 750, lineHeight: 1.6 }}>{d.description}</p>
      </div>
      <div style={{ maxWidth: 1300, margin: "0 auto", padding: "0 24px 40px" }}>
        <div style={{ borderRadius: 12, overflow: "hidden", border: "1px solid rgba(255,255,255,0.06)" }}>
          {React.createElement(renderers[active])}
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
