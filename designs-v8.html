<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Padmalaya Textiles — Design Concepts v8 (Glass × Neumorphism)</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400&family=DM+Sans:ital,wght@0,400;0,500;0,600;0,700&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet" />
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#141210}
@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
@keyframes goldFlow{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}
@keyframes breathe{0%,100%{box-shadow:0 0 0 0 rgba(197,160,89,.2)}50%{box-shadow:0 0 0 16px rgba(197,160,89,0)}}
@keyframes marquee{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}
@keyframes flareDrift{0%,100%{opacity:.55;transform:translate(0,0) scale(1)}50%{opacity:.85;transform:translate(8px,-6px) scale(1.03)}}
.mq-track{display:flex;animation:marquee 34s linear infinite;white-space:nowrap}
.hover-lift{transition:transform .45s cubic-bezier(.23,1,.32,1),box-shadow .45s ease,filter .35s ease}
.hover-lift:hover{transform:translateY(-5px)}
.focus-ring:focus{outline:2px solid #C5A059;outline-offset:3px}
/* Porthole: reduce frost on hover */
.porthole-inner{transition:backdrop-filter .4s ease,background .4s ease,-webkit-backdrop-filter .4s ease}
.porthole-wrap:hover .porthole-inner{-webkit-backdrop-filter:blur(4px)!important;backdrop-filter:blur(4px)!important;background:rgba(255,253,248,.55)!important}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState } = React;

const nav = ["Home", "Products", "About", "Process", "Contact"];
const products = [
  { name: "Classic Terry Bath Towel", size: "70×140 cm", weight: "500 GSM", tag: "Bestseller", desc: "Plush, absorbent, and built to last through hundreds of washes — our signature weave." },
  { name: "Premium Face Towel Set", size: "30×30 cm", weight: "450 GSM", tag: "New", desc: "Ultra-soft face towels, gentle on skin. Ideal for hotels and spa settings." },
  { name: "Luxury Hand Towel", size: "40×70 cm", weight: "550 GSM", tag: "Premium", desc: "Double-loop terry for maximum absorbency and a velvety hand feel." },
  { name: "Hotel Bath Sheet", size: "90×180 cm", weight: "600 GSM", tag: "Bulk", desc: "Oversized bath sheets for 5-star hospitality. Private labeling available." },
  { name: "Terry Kitchen Napkin", size: "45×65 cm", weight: "350 GSM", tag: "Popular", desc: "Lint-free, quick-dry cotton for professional kitchens." },
  { name: "Spa Wrap Towel", size: "80×150 cm", weight: "480 GSM", tag: "Luxury", desc: "Full-body spa wraps with secure tuck closure. Available in 22 colours." },
];

/* Tokens — Stitch "Luminous Archive" + Magic liquid-glass layering cues */
const T = {
  cream: "#F5F0E6",
  creamDeep: "#EBE4D6",
  espresso: "#2A2118",
  espressoSoft: "#4A3F35",
  gold: "#C5A059",
  goldDeep: "#8B6914",
  sage: "#9A9578",
  sageMist: "#B2AC88",
};

const designs = [
  {
    id: 36,
    name: "Strata Luminosa",
    philosophy: "Stacked frosted planes · Antique gold rim-light · Neumorphic dock",
    description: "Three offset glass sheets (variable translucency + blur) float over a painted cream–sage–gold mesh so backdrop-filter has depth to read. Navigation sits on a molded neumorphic dock; each product is a glass slab cast into a soft-UI recess — glass where you read, neu where you rest your hand.",
  },
  {
    id: 37,
    name: "Porthole Loom",
    philosophy: "Circular glass portals · Raised neumorphic bezels · Orbital hero",
    description: "A rare layout: the hero is a constellation of portholes — outer torus is pure soft-UI (dual shadow), inner disk is heavy frost that clears on hover (Magic-style liquid reveal). Copy lives in a glass capsule between orbits; catalogue returns to a calmer horizontal rhythm below.",
  },
  {
    id: 38,
    name: "Prism Split",
    philosophy: "Diagonal clip · Half heavy-glass / half pressed-clay neu",
    description: "One screen, two physics models: clipped polygon zone is all frosted UI; the complementary wedge is solid neumorphic cream with debossed stats. The seam is a sage-tinted shadow valley — no 1px hairline, only tonal violence. Breaks the usual centered hero completely.",
  },
  {
    id: 39,
    name: "Refracted Bento",
    philosophy: "Variable blur lattice · Gold groove rails · Neu gutter bed",
    description: "Six modules, six blur radii — simulating panes of different thickness. Cells sit in a recessed neumorphic tray; thin gold-gradient channels read as cut grooves between glass tiles. Inspired by Stitch’s variable-blur bento spec.",
  },
  {
    id: 40,
    name: "Lens & Letterpress",
    philosophy: "Lens-flare glass hero · Debossed display type · Silk CTA",
    description: "Radial warm flares drift behind a single large frosted panel. The headline uses inverse shadows for letterpress depth while the panel itself stays luminous. Primary button: gold silk gradient with breathe glow; secondary: sage-tinted neumorphic pill.",
  },
];

const glass = (blurPx, extra = {}) => ({
  background: "rgba(255, 252, 247, 0.42)",
  WebkitBackdropFilter: `saturate(1.15) blur(${blurPx}px)`,
  backdropFilter: `saturate(1.15) blur(${blurPx}px)`,
  boxShadow: `inset 0 0 0 1px rgba(197, 160, 89, 0.28), inset 2px 3px 12px rgba(255,255,255,0.45), 0 12px 40px rgba(42, 33, 24, 0.07)`,
  ...extra,
});

const neu = "10px 10px 22px rgba(42,33,24,.11), -8px -8px 20px rgba(255,255,255,.78)";
const neuSm = "6px 6px 14px rgba(42,33,24,.09), -5px -5px 14px rgba(255,255,255,.75)";
const neuIn = "inset 5px 5px 14px rgba(42,33,24,.08), inset -4px -4px 12px rgba(255,255,255,.55)";
const goldG = `linear-gradient(135deg, ${T.gold}, #E8D5A3)`;

function Design36() {
  const meshBg = {
    backgroundColor: T.creamDeep,
    backgroundImage: `
      radial-gradient(ellipse 70% 50% at 15% 25%, rgba(178,172,136,.45) 0%, transparent 55%),
      radial-gradient(ellipse 55% 45% at 88% 75%, rgba(197,160,89,.22) 0%, transparent 50%),
      radial-gradient(circle at 50% 100%, rgba(42,33,24,.04) 0%, transparent 40%),
      linear-gradient(168deg, #f7f2ea 0%, #e8e0d2 100%)`,
  };
  return (
    <div style={{ ...meshBg, color: T.espresso, fontFamily: "'DM Sans', sans-serif", minHeight: "100%", position: "relative" }}>
      <nav style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "22px 40px", position: "relative", zIndex: 2 }}>
        <div style={{ background: T.cream, boxShadow: neuSm, padding: "12px 26px", borderRadius: 50, fontFamily: "'Playfair Display', serif", fontSize: 20, letterSpacing: 4 }}>PADMALAYA</div>
        <div style={{ display: "flex", gap: 18, background: T.cream, boxShadow: neuIn, padding: "8px 10px", borderRadius: 50 }}>
          {nav.map((n) => (
            <span key={n} style={{ padding: "8px 14px", fontSize: 12, fontWeight: 600, color: T.espressoSoft, cursor: "pointer", borderRadius: 40 }}>{n}</span>
          ))}
        </div>
        <button type="button" className="focus-ring" style={{ background: goldG, color: T.espresso, border: "none", padding: "12px 26px", borderRadius: 50, fontWeight: 700, cursor: "pointer", animation: "breathe 3.5s ease infinite" }}>Quote</button>
      </nav>

      <div style={{ padding: "28px 40px 36px", position: "relative", zIndex: 1 }}>
        <div style={{ position: "relative", maxWidth: 720, marginLeft: 8 }}>
          <div style={{ ...glass(10), borderRadius: 22, padding: "28px 32px", marginBottom: -52, marginLeft: 36, position: "relative", zIndex: 3 }}>
            <p style={{ fontSize: 11, letterSpacing: 3, color: T.goldDeep, fontWeight: 700, textTransform: "uppercase" }}>Strata · 01</p>
          </div>
          <div style={{ ...glass(18), borderRadius: 24, padding: "36px 36px 40px", marginLeft: 0, position: "relative", zIndex: 2 }}>
            <h1 style={{ fontFamily: "'Playfair Display', serif", fontSize: 44, fontWeight: 600, lineHeight: 1.08, marginBottom: 14 }}>
              Light through<br /><span style={{ fontStyle: "italic", color: T.goldDeep }}>every layer</span>
            </h1>
            <p style={{ fontSize: 15, color: T.espressoSoft, lineHeight: 1.75, maxWidth: 400 }}>Cotton terry for hospitality — glass-clear specs, clay-soft support.</p>
          </div>
          <div style={{ ...glass(26), borderRadius: 20, padding: "20px 28px", marginTop: -24, marginLeft: 120, position: "relative", zIndex: 4, maxWidth: 380 }}>
            <span style={{ fontSize: 13, fontWeight: 700, color: T.sage }}>Karur · ISO · OEKO-TEX</span>
          </div>
        </div>
      </div>

      <div style={{ padding: "48px 40px 56px", position: "relative", zIndex: 1 }}>
        <h2 style={{ fontFamily: "'Playfair Display', serif", fontSize: 28, marginBottom: 24, textAlign: "center" }}>Collection</h2>
        <div style={{ display: "grid", gridTemplateColumns: "repeat(3, 1fr)", gap: 22 }}>
          {products.map((p, i) => (
            <div key={p.name} className="hover-lift" style={{ background: T.cream, boxShadow: neuIn, borderRadius: 24, padding: 10 }}>
              <div style={{ ...glass(14), borderRadius: 18, padding: "20px 20px 22px", minHeight: 200 }}>
                <span style={{ fontSize: 10, fontWeight: 800, letterSpacing: 1, color: T.espresso, background: "rgba(197,160,89,.22)", padding: "4px 10px", borderRadius: 8 }}>{p.tag}</span>
                <h3 style={{ fontFamily: "'Playfair Display', serif", fontSize: 18, margin: "12px 0 8px" }}>{p.name}</h3>
                <p style={{ fontSize: 12, color: T.espressoSoft, lineHeight: 1.55, marginBottom: 12 }}>{p.desc}</p>
                <div style={{ fontSize: 11, color: T.sage, marginBottom: 12 }}>{p.size} · {p.weight}</div>
                <button type="button" className="focus-ring" style={{ width: "100%", background: T.cream, boxShadow: neuSm, border: "none", padding: 10, borderRadius: 50, fontWeight: 700, color: T.goldDeep, cursor: "pointer" }}>Enquire</button>
              </div>
            </div>
          ))}
        </div>
      </div>

      <div style={{ margin: "0 40px 40px", ...glass(12), borderRadius: 24, padding: "32px 36px", display: "flex", justifyContent: "space-between", alignItems: "center", flexWrap: "wrap", gap: 16 }}>
        <p style={{ fontWeight: 600, color: T.espressoSoft }}>Bulk from 500 pcs · © 2026 Padmalaya Textiles</p>
        <button type="button" className="focus-ring" style={{ background: T.cream, boxShadow: neu, border: "none", padding: "14px 32px", borderRadius: 50, fontWeight: 800, cursor: "pointer" }}>Start</button>
      </div>
    </div>
  );
}

function Design37() {
  const holes = [
    { label: "500 GSM", sub: "Luxury" },
    { label: "100%", sub: "Cotton" },
    { label: "25+", sub: "Years" },
    { label: "40+", sub: "Nations" },
  ];
  return (
    <div style={{ background: T.cream, color: T.espresso, fontFamily: "'DM Sans', sans-serif", minHeight: "100%", paddingBottom: 48 }}>
      <nav style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "20px 40px" }}>
        <span style={{ fontFamily: "'Instrument Serif', serif", fontSize: 26 }}>Padmalaya</span>
        <div style={{ display: "flex", gap: 22 }}>{nav.map((n) => <span key={n} style={{ fontSize: 13, color: T.espressoSoft, cursor: "pointer" }}>{n}</span>)}</div>
        <button type="button" className="focus-ring" style={{ background: T.cream, boxShadow: neuSm, border: "none", padding: "11px 24px", borderRadius: 50, fontWeight: 700, cursor: "pointer" }}>Enquire</button>
      </nav>

      <div style={{ padding: "32px 40px 20px", textAlign: "center" }}>
        <p style={{ fontSize: 11, letterSpacing: 4, color: T.goldDeep, fontWeight: 700, marginBottom: 20 }}>PORTHOLE LOOM</p>
        <div style={{ display: "flex", flexWrap: "wrap", justifyContent: "center", alignItems: "center", gap: 28, marginBottom: 28 }}>
          {holes.map((h, i) => (
            <div key={h.label} className="porthole-wrap" style={{ width: 132, height: 132, borderRadius: "50%", background: T.cream, boxShadow: neu, display: "flex", alignItems: "center", justifyContent: "center", padding: 10 }}>
              <div className="porthole-inner" style={{ width: "100%", height: "100%", borderRadius: "50%", ...glass(22, { display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center" }) }}>
                <span style={{ fontFamily: "'Playfair Display', serif", fontSize: 26, fontWeight: 700, color: T.goldDeep }}>{h.label}</span>
                <span style={{ fontSize: 10, letterSpacing: 2, color: T.sage, marginTop: 4, textTransform: "uppercase" }}>{h.sub}</span>
              </div>
            </div>
          ))}
        </div>
        <div style={{ maxWidth: 560, margin: "0 auto", ...glass(16), borderRadius: 50, padding: "22px 32px" }}>
          <p style={{ fontSize: 16, fontFamily: "'Playfair Display', serif", fontStyle: "italic", lineHeight: 1.5 }}>We manufacture the terry that finishes the world&apos;s quietest hotel rooms.</p>
        </div>
      </div>

      <div style={{ padding: "40px 40px 0" }}>
        <h2 style={{ fontFamily: "'Playfair Display', serif", fontSize: 26, textAlign: "center", marginBottom: 28 }}>Range</h2>
        <div style={{ display: "grid", gridTemplateColumns: "repeat(3, 1fr)", gap: 20 }}>
          {products.map((p) => (
            <div key={p.name} className="hover-lift" style={{ borderRadius: 20, background: T.cream, boxShadow: neu, padding: 4 }}>
              <div style={{ borderRadius: 16, ...glass(8), padding: "18px 20px 22px" }}>
                <h3 style={{ fontFamily: "'Playfair Display', serif", fontSize: 17 }}>{p.name}</h3>
                <p style={{ fontSize: 12, color: T.espressoSoft, margin: "10px 0", lineHeight: 1.55 }}>{p.desc}</p>
                <span style={{ fontSize: 11, color: T.sage }}>{p.weight}</span>
              </div>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

function Design38() {
  return (
    <div style={{ fontFamily: "'DM Sans', sans-serif", minHeight: "100%", position: "relative", background: T.creamDeep, overflow: "hidden" }}>
      <div style={{ position: "absolute", inset: 0, clipPath: "polygon(0 0, 58% 0, 42% 100%, 0 100%)", background: `linear-gradient(145deg, rgba(154,149,120,.35) 0%, rgba(245,240,230,.95) 40%, rgba(235,228,214,1) 100%)`, zIndex: 0 }} />
      <div style={{ position: "absolute", inset: 0, clipPath: "polygon(58% 0, 100% 0, 100% 100%, 42% 100%)", background: T.cream, boxShadow: neuIn, zIndex: 0 }} />

      <nav style={{ position: "relative", zIndex: 2, display: "flex", justifyContent: "space-between", alignItems: "center", padding: "20px 36px" }}>
        <span style={{ fontFamily: "'Playfair Display', serif", fontSize: 22, color: T.espresso, letterSpacing: 3 }}>PADMALAYA</span>
        <div style={{ display: "flex", gap: 20 }}>{nav.map((n) => <span key={n} style={{ fontSize: 12, fontWeight: 600, color: T.espressoSoft, cursor: "pointer" }}>{n}</span>)}</div>
        <button type="button" className="focus-ring" style={{ ...glass(12), border: "none", padding: "10px 22px", borderRadius: 50, fontWeight: 700, color: T.espresso, cursor: "pointer" }}>Quote</button>
      </nav>

      <div style={{ position: "relative", zIndex: 1, display: "grid", gridTemplateColumns: "1fr 1fr", minHeight: 380, gap: 0 }}>
        <div style={{ padding: "44px 36px 44px 40px", display: "flex", flexDirection: "column", justifyContent: "center" }}>
          <div style={{ ...glass(24), borderRadius: 28, padding: "36px 32px", color: T.espresso, maxWidth: 400 }}>
            <h1 style={{ fontFamily: "'Playfair Display', serif", fontSize: 40, fontWeight: 600, lineHeight: 1.1, marginBottom: 16 }}>Two textures.<br />One mill.</h1>
            <p style={{ fontSize: 15, color: T.espressoSoft, lineHeight: 1.75, marginBottom: 24 }}>Left: frost, refraction, light. Right: pressed clay, certainty, touch.</p>
            <button type="button" className="focus-ring" style={{ background: goldG, color: T.espresso, border: "none", padding: "14px 28px", borderRadius: 50, fontWeight: 800, cursor: "pointer" }}>Explore</button>
          </div>
        </div>
        <div style={{ padding: "44px 40px 44px 28px", display: "flex", flexDirection: "column", justifyContent: "center" }}>
          <div style={{ background: T.cream, boxShadow: neuIn, borderRadius: 24, padding: "32px 28px" }}>
            <p style={{ fontSize: 11, letterSpacing: 3, color: T.sage, fontWeight: 700, marginBottom: 18 }}>PRESSED FIELD</p>
            {["25+ years", "500+ hotels", "50L+ units / yr"].map((t) => (
              <div key={t} style={{ padding: "14px 0", borderBottom: "1px solid rgba(42,33,24,.06)", fontSize: 18, fontFamily: "'Playfair Display', serif", color: T.espresso }}>{t}</div>
            ))}
          </div>
        </div>
      </div>

      <div style={{ position: "relative", zIndex: 2, padding: "32px 40px 44px", background: "rgba(245,240,230,.92)" }}>
        <h2 style={{ fontFamily: "'Playfair Display', serif", fontSize: 24, marginBottom: 22, textAlign: "center" }}>Products</h2>
        <div style={{ display: "grid", gridTemplateColumns: "repeat(3, 1fr)", gap: 18 }}>
          {products.map((p) => (
            <div key={p.name} className="hover-lift" style={{ background: T.cream, boxShadow: neuSm, borderRadius: 18, padding: "18px 20px" }}>
              <h3 style={{ fontSize: 16, fontWeight: 700 }}>{p.name}</h3>
              <p style={{ fontSize: 12, color: T.espressoSoft, margin: "8px 0" }}>{p.desc}</p>
              <span style={{ fontSize: 11, color: T.goldDeep, fontWeight: 700 }}>{p.size}</span>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

function Design39() {
  const blurs = [6, 10, 14, 18, 22, 26];
  const bento = [
    { title: "Hero", big: true, i: 0, span: 2 },
    { title: "25+", sub: "Years", i: 1, span: 1 },
    { title: "500+", sub: "Hotels", i: 2, span: 1 },
    { title: "Process", sub: "Spin · Weave · Finish", i: 3, span: 1 },
    { title: "Export", sub: "40+ countries", i: 4, span: 1 },
    { title: "Featured SKU", sub: "Bath sheet · 600 GSM · bulk programs", i: 5, span: 3 },
  ];
  return (
    <div style={{ background: T.creamDeep, fontFamily: "'DM Sans', sans-serif", minHeight: "100%", padding: "24px 32px 40px", color: T.espresso }}>
      <nav style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 20 }}>
        <span style={{ fontFamily: "'Playfair Display', serif", fontSize: 22 }}>Padmalaya</span>
        <div style={{ display: "flex", gap: 18 }}>{nav.map((n) => <span key={n} style={{ fontSize: 12, color: T.espressoSoft, cursor: "pointer" }}>{n}</span>)}</div>
        <button type="button" className="focus-ring" style={{ background: goldG, color: T.espresso, border: "none", padding: "10px 22px", borderRadius: 50, fontWeight: 700, cursor: "pointer" }}>Quote</button>
      </nav>

      <div style={{ background: T.cream, boxShadow: neuIn, borderRadius: 28, padding: 14 }}>
        <p style={{ fontSize: 10, letterSpacing: 3, color: T.goldDeep, fontWeight: 800, textAlign: "center", marginBottom: 12 }}>REFRACTED BENTO · VARIABLE BLUR</p>
        <div style={{ display: "grid", gridTemplateColumns: "repeat(3, 1fr)", gap: 12 }}>
          {bento.map((cell, idx) => (
            <div
              key={cell.title}
              className="hover-lift"
              style={{
                gridColumn: `span ${cell.span}`,
                borderRadius: 20,
                padding: 2,
                background: `linear-gradient(135deg, rgba(197,160,89,.35), rgba(154,149,120,.2), rgba(197,160,89,.25))`,
                backgroundSize: "200% 200%",
                animation: idx === 0 ? "goldFlow 8s ease infinite" : "none",
              }}
            >
              <div style={{ ...glass(blurs[cell.i]), borderRadius: 18, padding: cell.big ? "28px 26px" : "22px 18px", minHeight: cell.big ? 120 : 100, height: "100%" }}>
                <h3 style={{ fontFamily: "'Playfair Display', serif", fontSize: cell.big ? 28 : 22, marginBottom: 6 }}>{cell.title}</h3>
                <p style={{ fontSize: 13, color: T.espressoSoft }}>{cell.sub}</p>
                {cell.big && (
                  <p style={{ fontSize: 14, color: T.espressoSoft, marginTop: 12, maxWidth: 340, lineHeight: 1.6 }}>Each pane diffracts the same story — Indian cotton, hotel-grade construction, export discipline.</p>

          ))}

      </div>

      <div style={{ marginTop: 28, display: "grid", gridTemplateColumns: "repeat(3, 1fr)", gap: 16 }}>
        {products.slice(0, 6).map((p, i) => (
          <div key={p.name} style={{ borderRadius: 16, padding: 2, background: `linear-gradient(90deg, ${T.sageMist}55, ${T.gold}44)` }}>
            <div style={{ ...glass(8 + (i % 3) * 4), borderRadius: 14, padding: "16px 18px" }}>
              <span style={{ fontSize: 9, fontWeight: 800, color: T.goldDeep }}>{p.tag}</span>
              <h4 style={{ fontFamily: "'Playfair Display', serif", fontSize: 15, margin: "6px 0" }}>{p.name}</h4>
              <span style={{ fontSize: 11, color: T.espressoSoft }}>{p.weight}</span>
            </div>
          </div>
        ))}
      </div>
    </div>

}

function Design40() {
  return (
    <div style={{ background: `linear-gradient(165deg, ${T.cream} 0%, ${T.creamDeep} 100%)`, fontFamily: "'DM Sans', sans-serif", minHeight: "100%", position: "relative", overflow: "hidden", color: T.espresso }}>
      <div style={{ position: "absolute", width: 420, height: 420, borderRadius: "50%", background: "radial-gradient(circle, rgba(255,210,160,.45) 0%, transparent 65%)", top: -120, right: -80, animation: "flareDrift 12s ease-in-out infinite", pointerEvents: "none" }} />
      <div style={{ position: "absolute", width: 300, height: 300, borderRadius: "50%", background: "radial-gradient(circle, rgba(197,160,89,.25) 0%, transparent 60%)", bottom: 40, left: -60, animation: "flareDrift 14s ease-in-out infinite 2s", pointerEvents: "none" }} />

      <nav style={{ position: "relative", zIndex: 2, display: "flex", justifyContent: "space-between", alignItems: "center", padding: "22px 40px" }}>
        <span style={{ fontFamily: "'Playfair Display', serif", fontSize: 22, letterSpacing: 4 }}>PADMALAYA</span>
        <div style={{ display: "flex", gap: 24 }}>{nav.map((n) => <span key={n} style={{ fontSize: 13, color: T.espressoSoft, cursor: "pointer" }}>{n}</span>)}</div>
        <button type="button" className="focus-ring" style={{ background: T.cream, boxShadow: neuSm, border: "none", padding: "11px 24px", borderRadius: 50, fontWeight: 700, cursor: "pointer" }}>Contact</button>
      </nav>

      <div style={{ position: "relative", zIndex: 1, padding: "48px 40px 40px", maxWidth: 900, margin: "0 auto" }}>

}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
