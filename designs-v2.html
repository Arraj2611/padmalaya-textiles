<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #0a0a0a; font-family: 'DM Sans', system-ui, sans-serif; }

@keyframes shimmer {
  0% { background-position: -200% center; }
  100% { background-position: 200% center; }
}
@keyframes float {
  0%, 100% { transform: translateY(0px); }
  50% { transform: translateY(-10px); }
}
@keyframes gradientShift {
  0% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}
@keyframes pulse {
  0%, 100% { opacity: 1; transform: scale(1); }
  50% { opacity: 0.7; transform: scale(1.05); }
}
@keyframes marquee {
  0% { transform: translateX(0); }
  100% { transform: translateX(-50%); }
}
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(24px); }
  to { opacity: 1; transform: translateY(0); }
}
@keyframes scaleIn {
  from { opacity: 0; transform: scale(0.94); }
  to { opacity: 1; transform: scale(1); }
}
@keyframes borderGlow {
  0%, 100% { box-shadow: 0 0 8px rgba(245,158,11,0.3), 0 0 20px rgba(245,158,11,0.1); }
  50% { box-shadow: 0 0 20px rgba(245,158,11,0.7), 0 0 40px rgba(245,158,11,0.3); }
}
@keyframes radialPulse {
  0%, 100% { opacity: 0.4; transform: scale(1); }
  50% { opacity: 0.7; transform: scale(1.08); }
}

.shimmer-text {
  background: linear-gradient(90deg, #D4A843 0%, #F5D78A 30%, #D4A843 50%, #B8920E 70%, #D4A843 100%);
  background-size: 200% auto;
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  animation: shimmer 3s linear infinite;
}
.float-anim { animation: float 4s ease-in-out infinite; }
.fade-up { animation: fadeUp 0.7s ease forwards; }
.scale-in { animation: scaleIn 0.5s ease forwards; }
.border-glow { animation: borderGlow 2.5s ease-in-out infinite; }
.marquee-track { animation: marquee 22s linear infinite; display: flex; white-space: nowrap; }
.gradient-shift {
  background: linear-gradient(-45deg, #0F0B2E, #1a0f4e, #2d1b69, #1a0f4e);
  background-size: 400% 400%;
  animation: gradientShift 8s ease infinite;
}
</style>

        <span style={{ fontSize: 12, color: muted, letterSpacing: 1 }}>Karur, Tamil Nadu, India · © 2025</span>

  );
}
