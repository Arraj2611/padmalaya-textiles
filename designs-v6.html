      <div style={{position:"sticky",top:0,zIndex:100,background:"rgba(10,10,10,.95)",backdropFilter:"blur(12px)",borderBottom:"1px solid rgba(255,255,255,.06)",padding:"0 24px"}}>
        <div style={{display:"flex",alignItems:"center",gap:6,maxWidth:1300,margin:"0 auto",height:56}}>
          <span style={{fontSize:12,color:"rgba(255,255,255,.35)",marginRight:10,letterSpacing:1.5}}>DESIGN:</span>
          {designs.map((dd,i)=>(
            <button key={i} onClick={()=>setActive(i)}
              style={{background:active===i?"rgba(255,255,255,.1)":"transparent",color:active===i?"#fff":"rgba(255,255,255,.4)",border:active===i?"1px solid rgba(255,255,255,.15)":"1px solid transparent",padding:"6px 14px",fontSize:12,cursor:"pointer",borderRadius:6,transition:"all .2s",whiteSpace:"nowrap"}}>
              {dd.id}. {dd.name}
            </button>
          ))}
        </div>
      </div>
      <div style={{maxWidth:1300,margin:"0 auto",padding:"20px 24px 14px"}}>
        <h2 style={{fontSize:22,fontWeight:600,marginBottom:4}}>{d.name}</h2>
        <p style={{fontSize:13,color:"rgba(255,255,255,.35)",marginBottom:6}}>{d.philosophy}</p>
        <p style={{fontSize:13,color:"rgba(255,255,255,.55)",maxWidth:750,lineHeight:1.6}}>{d.description}</p>
      </div>
      <div style={{maxWidth:1300,margin:"0 auto",padding:"0 24px 40px"}}>
        <div style={{borderRadius:12,overflow:"hidden",border:"1px solid rgba(255,255,255,.06)"}}>
          {React.createElement(renderers[active])}
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
