<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Padmalaya Textiles — Design Concepts v9 (Silk · Glass · Deep Green)</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;0,9..144,700;1,9..144,400&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0c1612}
@keyframes silkDrift{0%,100%{background-position:0% 50%,100% 50%}50%{background-position:100% 50%,0% 50%}}
@keyframes silkSheen{0%{background-position:-180% 0}100%{background-position:180% 0}}
@keyframes breatheG{0%,100%{box-shadow:0 0 0 0 rgba(30,77,63,.18)}50%{box-shadow:0 0 0 14px rgba(30,77,63,0)}}
@keyframes floatY{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
.hover-lift{transition:transform .45s cubic-bezier(.23,1,.32,1),box-shadow .45s ease,filter .35s ease}
.hover-lift:hover{transform:translateY(-4px)}
.focus-ring:focus{outline:2px solid #2d5a4c;outline-offset:3px}
.img-cover{width:100%;height:100%;object-fit:cover;display:block}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState } = React;

const nav = ["Home", "Products", "About", "Process", "Contact"];

const products = [
  { name: "Classic Terry Bath Towel", size: "70×140 cm", weight: "500 GSM", tag: "Bestseller", desc: "Plush, absorbent, and built to last through hundreds of washes — our signature weave.", img: "https://images.unsplash.com/photo-1584622650111-993a426fbf0a?w=800&q=80" },
  { name: "Premium Face Towel Set", size: "30×30 cm", weight: "450 GSM", tag: "New", desc: "Ultra-soft face towels, gentle on skin. Ideal for hotels and spa settings.", img: "https://images.unsplash.com/photo-1556228453-efd6c1ff04f6?w=800&q=80" },
  { name: "Luxury Hand Towel", size: "40×70 cm", weight: "550 GSM", tag: "Premium", desc: "Double-loop terry for maximum absorbency and a velvety hand feel.", img: "https://images.unsplash.com/photo-1631049307264-da0ec9d70304?w=800&q=80" },
  { name: "Hotel Bath Sheet", size: "90×180 cm", weight: "600 GSM", tag: "Bulk", desc: "Oversized bath sheets for 5-star hospitality. Private labeling available.", img: "https://images.unsplash.com/photo-1600585154340-be6161a56a0c?w=800&q=80" },
  { name: "Terry Kitchen Napkin", size: "45×65 cm", weight: "350 GSM", tag: "Popular", desc: "Lint-free, quick-dry cotton for professional kitchens.", img: "https://images.unsplash.com/photo-1616486338812-3dadae4b4cce?w=800&q=80" },
  { name: "Spa Wrap Towel", size: "80×150 cm", weight: "480 GSM", tag: "Luxury", desc: "Full-body spa wraps with secure tuck closure. Available in 22 colours.", img: "https://images.unsplash.com/photo-1616628182508-9ae7b31e2e6e?w=800&q=80" },
];

/* Light bases + deep green system — not cream-only */
const T = {
  porcelain: "#F5F8F7",
  pearl: "#F3F6F4",
  mist: "#EEF3F1",
  paper: "#FAFAF8",
  frost: "#F0F4F2",
  cloud: "#F7F9F8",
  ink: "#14221e",
  inkSoft: "#2d4a42",
  forest: "#0d281f",
  moss: "#1e4d3f",
  pine: "#243D36",
  brass: "#b8955c",
  brassDeep: "#7a5f32",
};

const designs = [
  { id: 41, name: "Porcelain Canopy", philosophy: "Cool porcelain field · Arched silk under vault glass · Neu dock", description: "Hero stacks luminous silk-fold gradients beneath a tall arched frosted panel — procurement copy reads like a gallery label. Catalogue breaks into an intentional masonry: mixed aspect tiles, hex clips, and inset neu wells so no two rows feel the same." },
  { id: 42, name: "Emerald Atelier", philosophy: "Pearl green mist · Split silk / glass hero · Filmstrip products", description: "Left third carries animated silk sheen; the right holds a deep-glass thesis statement. Products scroll as a cinematic filmstrip: wide polaroid frames, heavy imagery, specs in a vertical rail." },
  { id: 43, name: "Verdigris Vault", philosophy: "Marble-white cool · Concentric neu orbits · Satellite catalogue", description: "Hero is a laboratory specimen: rings of soft UI around a glass core with letterpressed type. Six SKUs orbit a gravitational centre card — circular crops and tangential labels." },
  { id: 44, name: "Moss & Marble", philosophy: "Near-white marble wash · Layered glass seams · Magazine spread", description: "Background veining suggests stone, not linen default. Hero uses offset glass slabs with moss-tinted flares. Products deploy an editorial spread: two hero spans, a sidebar column, and inset tiles." },
  { id: 45, name: "Deep Canopy Silk", philosophy: "Vertical silk curtain folds · Lens glass CTA · Zigzag editorial rows", description: "Full-height silk bands (CSS) sit behind a floating glass capsule. The range reads as alternating runway panels — full-bleed photo, then typographic block, rhythm inverting per row." },
];

const goldG = `linear-gradient(135deg, ${T.brass}, #e8d4b0)`;

function glass(blurPx, extra = {}) {
  return {
    background: "rgba(255, 255, 255, 0.44)",
    WebkitBackdropFilter: `saturate(1.1) blur(${blurPx}px)`,
    backdropFilter: `saturate(1.1) blur(${blurPx}px)`,
    boxShadow: `inset 0 0 0 1px rgba(36, 61, 54, 0.14), inset 2px 3px 14px rgba(255,255,255,0.55), 0 16px 48px rgba(13, 40, 31, 0.06)`,
    ...extra,
  };
}

const neu = `10px 10px 24px rgba(13,40,31,.11), -9px -9px 22px rgba(255,255,255,.88)`;
const neuSm = `6px 6px 16px rgba(13,40,31,.09), -5px -5px 16px rgba(255,255,255,.82)`;
const neuIn = `inset 5px 5px 14px rgba(13,40,31,.09), inset -4px -4px 12px rgba(255,255,255,.58)`;

/* Shared silk-under-glass base (animated folds) */
function silkBase(extra = {}) {
  return {
    backgroundColor: T.pearl,
    backgroundImage: `
      linear-gradient(105deg, rgba(255,255,255,.9) 0%, rgba(238,243,241,.4) 25%, rgba(255,255,255,.85) 50%, rgba(230,240,236,.5) 75%, rgba(255,255,255,.92) 100%),
      radial-gradient(ellipse 80% 60% at 20% 30%, rgba(30,77,63,.06) 0%, transparent 55%),
      radial-gradient(ellipse 70% 50% at 85% 70%, rgba(184,149,92,.08) 0%, transparent 50%),
      linear-gradient(180deg, ${T.mist} 0%, ${T.cloud} 100%)`,
    backgroundSize: "200% 200%, 100% 100%, 100% 100%, 100% 100%",
    animation: "silkDrift 18s ease-in-out infinite",
    ...extra,
  };
}

function Design41() {
  const masonry = [
    { span: "span 2", clip: "none", h: 220, p: products[0] },
    { span: "span 1", clip: "polygon(12% 0, 100% 0, 100% 100%, 0 100%, 0 18%)", h: 280, p: products[1] },
    { span: "span 1", clip: "circle(50% at 50% 45%)", h: 280, p: products[2] },
    { span: "span 1", clip: "none", h: 200, p: products[3] },
    { span: "span 2", clip: "polygon(0 0, 100% 0, 100% 88%, 92% 100%, 0 100%)", h: 240, p: products[4] },
    { span: "span 3", clip: "none", h: 200, p: products[5] },
  ];
  return (
    <div style={{ ...silkBase(), color: T.ink, fontFamily: "'Outfit', sans-serif", minHeight: "100%" }}>
      <nav style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "22px 40px" }}>
        <div style={{ ...glass(14), padding: "12px 28px", borderRadius: 60, fontFamily: "'Fraunces', serif", fontSize: 19, letterSpacing: 3, color: T.forest }}>PADMALAYA</div>
        <div style={{ display: "flex", gap: 8, background: T.porcelain, boxShadow: neuIn, padding: "8px 10px", borderRadius: 50 }}>
          {nav.map((n) => (
            <span key={n} style={{ padding: "9px 14px", fontSize: 11, fontWeight: 600, color: T.inkSoft, cursor: "pointer", borderRadius: 40 }}>{n}</span>
          ))}
        </div>
        <button type="button" className="focus-ring" style={{ background: T.forest, color: "#fff", border: "none", padding: "12px 28px", borderRadius: 50, fontWeight: 700, cursor: "pointer", boxShadow: neuSm }}>Quote</button>
      </nav>

      <div style={{ padding: "32px 40px 28px", position: "relative" }}>
        <div style={{ position: "absolute", inset: "8% 12% auto 12%", height: 320, borderRadius: "50% 50% 42% 42% / 60% 60% 40% 40%", background: "radial-gradient(ellipse, rgba(30,77,63,.07) 0%, transparent 70%)", pointerEvents: "none" }} />
        <div style={{ maxWidth: 820, margin: "0 auto", borderRadius: "120px 120px 36px 36px", ...glass(22), padding: "52px 48px 56px", position: "relative", overflow: "hidden" }}>
          <div style={{ position: "absolute", inset: 0, background: "linear-gradient(118deg, rgba(255,255,255,.25) 0%, transparent 45%, rgba(30,77,63,.04) 100%)", pointerEvents: "none" }} />
          <p style={{ fontSize: 10, letterSpacing: 4, color: T.moss, fontWeight: 800, marginBottom: 16 }}>SILK UNDER GLASS · 41</p>
          <h1 style={{ fontFamily: "'Fraunces', serif", fontSize: 46, fontWeight: 600, lineHeight: 1.05, color: T.ink, textShadow: "1px 1px 0 rgba(255,255,255,.7), 0 2px 24px rgba(30,77,63,.08)", marginBottom: 18 }}>
            Terry, suspended in<br />
            <span style={{ fontStyle: "italic", background: goldG, WebkitBackgroundClip: "text", WebkitTextFillColor: "transparent", backgroundSize: "200% 100%", animation: "silkSheen 6s linear infinite" }}>quiet light</span>
          </h1>
          <p style={{ fontSize: 16, color: T.inkSoft, lineHeight: 1.75, maxWidth: 460, marginBottom: 28 }}>Indian cotton, hotel-grade construction — shown the way fine fabric deserves: folds first, frost second, facts last.</p>
          <div style={{ display: "flex", gap: 12, flexWrap: "wrap" }}>
            <button type="button" className="focus-ring" style={{ background: goldG, color: T.ink, border: "none", padding: "15px 32px", borderRadius: 50, fontWeight: 800, cursor: "pointer", animation: "breatheG 3.4s ease infinite" }}>Collection PDF</button>
            <button type="button" className="focus-ring" style={{ background: T.porcelain, boxShadow: neu, border: "none", padding: "15px 32px", borderRadius: 50, fontWeight: 700, color: T.forest, cursor: "pointer" }}>Karur visit</button>
          </div>
        </div>
      </div>

      <div style={{ padding: "36px 40px 48px" }}>
        <h2 style={{ fontFamily: "'Fraunces', serif", fontSize: 26, marginBottom: 8, color: T.pine }}>Masonry range</h2>
        <p style={{ fontSize: 12, color: T.inkSoft, marginBottom: 22, maxWidth: 520 }}>Unequal tiles — each card carries a photograph; geometry varies so the grid breathes.</p>
        <div style={{ display: "grid", gridTemplateColumns: "repeat(3, 1fr)", gap: 16, gridAutoRows: "minmax(120px, auto)" }}>
          {masonry.map((m, i) => (
            <div key={m.p.name + i} className="hover-lift" style={{ gridColumn: m.span, background: T.porcelain, boxShadow: neuIn, borderRadius: 24, padding: 8, overflow: "hidden" }}>
              <div style={{ height: m.h, borderRadius: m.clip === "none" ? 18 : 0, overflow: "hidden", clipPath: m.clip, background: T.mist }}>
                <img src={m.p.img} alt={m.p.name} className="img-cover" style={{ minHeight: m.h }} />
              </div>
              <div style={{ padding: "14px 12px 16px" }}>
                <span style={{ fontSize: 9, fontWeight: 800, letterSpacing: 1, color: T.brassDeep }}>{m.p.tag}</span>
                <h3 style={{ fontFamily: "'Fraunces', serif", fontSize: 17, margin: "6px 0 4px", color: T.ink }}>{m.p.name}</h3>
                <p style={{ fontSize: 11, color: T.inkSoft, lineHeight: 1.5, marginBottom: 8 }}>{m.p.desc.slice(0, 72)}…</p>
                <span style={{ fontSize: 10, color: T.moss, fontWeight: 600 }}>{m.p.size} · {m.p.weight}</span>
              </div>
            </div>
          ))}
        </div>
      </div>

      <div style={{ margin: "0 40px 40px", ...glass(12), borderRadius: 22, padding: "26px 32px", display: "flex", justifyContent: "space-between", alignItems: "center", flexWrap: "wrap", gap: 14 }}>
        <p style={{ fontWeight: 600, color: T.inkSoft, fontSize: 13 }}>Bulk from 500 pcs · © 2026 Padmalaya Textiles</p>
        <button type="button" className="focus-ring" style={{ background: T.forest, color: "#fff", border: "none", padding: "12px 28px", borderRadius: 50, fontWeight: 700, cursor: "pointer" }}>Start</button>
      </div>
    </div>
  );
}

function Design42() {
  return (
    <div style={{ background: T.mist, backgroundImage: "linear-gradient(160deg, #e8f0ec 0%, #f5f8f7 45%, #eef3f1 100%)", color: T.ink, fontFamily: "'Outfit', sans-serif", minHeight: "100%" }}>
      <nav style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "20px 36px" }}>
        <span style={{ fontFamily: "'Fraunces', serif", fontSize: 24, color: T.forest }}>Padmalaya</span>
        <div style={{ display: "flex", gap: 20 }}>{nav.map((n) => <span key={n} style={{ fontSize: 12, color: T.inkSoft, cursor: "pointer" }}>{n}</span>)}</div>
        <button type="button" className="focus-ring" style={{ ...glass(10), border: "none", padding: "10px 22px", borderRadius: 50, fontWeight: 700, cursor: "pointer", color: T.ink }}>Enquire</button>
      </nav>

      <div style={{ display: "grid", gridTemplateColumns: "minmax(0,340px) 1fr", gap: 0, minHeight: 420, alignItems: "stretch" }}>
        <div style={{ position: "relative", overflow: "hidden", margin: "0 0 0 36px", borderRadius: "28px 0 0 28px", background: `repeating-linear-gradient(92deg, rgba(255,255,255,.5) 0px, rgba(230,238,234,.9) 14px, rgba(255,255,255,.45) 28px)`, backgroundSize: "56px 100%", animation: "silkDrift 22s linear infinite" }}>
          <div style={{ position: "absolute", inset: 0, background: "linear-gradient(180deg, transparent 0%, rgba(13,40,31,.06) 100%)" }} />
          <div style={{ position: "absolute", bottom: 32, left: 28, right: 28, ...glass(16), borderRadius: 20, padding: "18px 20px" }}>
            <p style={{ fontSize: 11, fontWeight: 700, color: T.moss }}>ISO · OEKO-TEX · Export</p>
          </div>
        </div>
        <div style={{ padding: "44px 40px 44px 36px", display: "flex", alignItems: "center" }}>
          <div style={{ ...glass(26), borderRadius: 32, padding: "44px 40px", maxWidth: 540, width: "100%" }}>
            <p style={{ fontSize: 10, letterSpacing: 3, color: T.brassDeep, fontWeight: 800, marginBottom: 14 }}>EMERALD ATELIER</p>
            <h1 style={{ fontFamily: "'Fraunces', serif", fontSize: 42, lineHeight: 1.08, marginBottom: 18, color: T.ink }}>Specifications<br /><span style={{ fontStyle: "italic", color: T.moss }}>without sterility.</span></h1>
            <p style={{ fontSize: 15, color: T.inkSoft, lineHeight: 1.75, marginBottom: 26 }}>The same cotton story — told through glass, not grey boxes. Built for buyers who still zoom product shots.</p>
            <button type="button" className="focus-ring" style={{ background: T.forest, color: "#fff", border: "none", padding: "14px 30px", borderRadius: 50, fontWeight: 700, cursor: "pointer" }}>Open line sheet</button>
          </div>
        </div>
      </div>

      <div style={{ padding: "28px 0 48px", overflowX: "auto" }}>
        <p style={{ fontFamily: "'Fraunces', serif", fontSize: 22, margin: "0 36px 18px", color: T.pine }}>Filmstrip</p>
        <div style={{ display: "flex", gap: 20, padding: "0 36px 12px", width: "max-content" }}>
          {products.map((p) => (
            <div key={p.name} className="hover-lift" style={{ width: 280, flexShrink: 0, background: "#fff", boxShadow: neu, borderRadius: 8, padding: 12, transform: "rotate(-0.5deg)" }}>
              <div style={{ height: 200, borderRadius: 4, overflow: "hidden", marginBottom: 12, boxShadow: "0 4px 0 rgba(13,40,31,.12)" }}>
                <img src={p.img} alt={p.name} className="img-cover" />
              </div>
              <p style={{ fontSize: 9, fontWeight: 800, letterSpacing: 2, color: T.moss, marginBottom: 6 }}>{p.tag}</p>
              <h3 style={{ fontFamily: "'Fraunces', serif", fontSize: 17, marginBottom: 6 }}>{p.name}</h3>
              <p style={{ fontSize: 11, color: T.inkSoft, lineHeight: 1.5, marginBottom: 10 }}>{p.desc.slice(0, 90)}…</p>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", fontSize: 10, fontWeight: 600, color: T.brassDeep }}>
                <span>{p.weight}</span>
                <button type="button" className="focus-ring" style={{ background: T.mist, border: "none", padding: "6px 12px", borderRadius: 20, cursor: "pointer", fontWeight: 700, color: T.forest }}>SKU</button>
              </div>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

function Design43() {
  const center = products[0];
  const orbit = products.slice(1);
  return (
    <div style={{ background: T.paper, backgroundImage: "radial-gradient(circle at 50% 0%, rgba(30,77,63,.05) 0%, transparent 50%)", color: T.ink, fontFamily: "'Outfit', sans-serif", minHeight: "100%", paddingBottom: 48 }}>
      <nav style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "20px 40px" }}>
        <span style={{ fontFamily: "'Fraunces', serif", fontSize: 22, letterSpacing: 2 }}>PADMALAYA</span>
        <div style={{ display: "flex", gap: 18 }}>{nav.map((n) => <span key={n} style={{ fontSize: 12, color: T.inkSoft, cursor: "pointer" }}>{n}</span>)}</div>
        <button type="button" className="focus-ring" style={{ background: goldG, color: T.ink, border: "none", padding: "11px 24px", borderRadius: 50, fontWeight: 700, cursor: "pointer" }}>Contact</button>
      </nav>

      <div style={{ padding: "40px 40px 20px", display: "flex", justifyContent: "center" }}>
        <div style={{ position: "relative", width: 380, height: 380 }}>
          <div style={{ position: "absolute", inset: 0, borderRadius: "50%", background: T.porcelain, boxShadow: neu }} />
          <div style={{ position: "absolute", inset: 28, borderRadius: "50%", background: T.frost, boxShadow: neuIn }} />
          <div style={{ position: "absolute", inset: 56, borderRadius: "50%", ...glass(18), display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", padding: 28, textAlign: "center" }}>
            <p style={{ fontSize: 9, letterSpacing: 3, color: T.brassDeep, fontWeight: 800, marginBottom: 10 }}>SPECIMEN</p>
            <h1 style={{ fontFamily: "'Fraunces', serif", fontSize: 28, lineHeight: 1.15, color: T.ink, textShadow: "1px 1px 0 #fff, -1px -1px 0 rgba(13,40,31,.08)" }}>Cotton under<br />controlled light</h1>
            <p style={{ fontSize: 12, color: T.inkSoft, marginTop: 14, lineHeight: 1.6 }}>Karur mill · terry for hospitality</p>
          </div>
        </div>
      </div>

      <div style={{ position: "relative", maxWidth: 920, margin: "0 auto", padding: "20px 24px 0", minHeight: 520 }}>
        <div style={{ position: "absolute", left: "50%", top: "50%", transform: "translate(-50%, -50%)", width: 300, zIndex: 2 }}>
          <div className="hover-lift" style={{ background: T.porcelain, boxShadow: neu, borderRadius: 24, padding: 10, animation: "floatY 5s ease-in-out infinite" }}>
            <div style={{ width: "100%", height: 200, borderRadius: "50%", overflow: "hidden", marginBottom: 12 }}>
              <img src={center.img} alt={center.name} className="img-cover" />
            </div>
            <h3 style={{ fontFamily: "'Fraunces', serif", fontSize: 18, textAlign: "center" }}>{center.name}</h3>
            <p style={{ fontSize: 11, color: T.inkSoft, textAlign: "center", marginTop: 6 }}>{center.weight}</p>
          </div>
        </div>
        {orbit.map((p, i) => {
          const angle = (i / orbit.length) * Math.PI * 2 - Math.PI / 2;
          const r = 210;
          const x = Math.cos(angle) * r;
          const y = Math.sin(angle) * r;
          return (
            <div
              key={p.name}
              className="hover-lift"
              style={{
                position: "absolute",
                left: `calc(50% + ${x}px - 76px)`,
                top: `calc(50% + ${y}px - 100px)`,
                width: 152,
                zIndex: 1,
              }}
            >
              <div style={{ ...glass(10), borderRadius: 20, padding: 8, textAlign: "center" }}>
                <div style={{ width: 120, height: 120, margin: "0 auto 8px", borderRadius: "50%", overflow: "hidden", boxShadow: neuIn }}>
                  <img src={p.img} alt={p.name} className="img-cover" />
                </div>
                <h4 style={{ fontFamily: "'Fraunces', serif", fontSize: 12, lineHeight: 1.25 }}>{p.name}</h4>
                <span style={{ fontSize: 9, color: T.moss, fontWeight: 600 }}>{p.tag}</span>
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

function Design44() {
  return (
    <div style={{ fontFamily: "'Outfit', sans-serif", minHeight: "100%", color: T.ink, background: T.cloud, backgroundImage: `
      linear-gradient(rgba(255,255,255,.85), rgba(255,255,255,.85)),
      repeating-linear-gradient(-12deg, transparent, transparent 40px, rgba(13,40,31,.03) 40px, rgba(13,40,31,.03) 41px),
      linear-gradient(145deg, #f0f5f3 0%, #fafcfa 100%)` }}>
      <nav style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "22px 40px" }}>
        <span style={{ fontFamily: "'Fraunces', serif", fontSize: 21, color: T.forest }}>Padmalaya</span>
        <div style={{ display: "flex", gap: 22 }}>{nav.map((n) => <span key={n} style={{ fontSize: 12, fontWeight: 600, color: T.inkSoft, cursor: "pointer" }}>{n}</span>)}</div>
        <button type="button" className="focus-ring" style={{ background: T.porcelain, boxShadow: neuSm, border: "none", padding: "11px 24px", borderRadius: 50, fontWeight: 700, cursor: "pointer" }}>Quote</button>
      </nav>

      <div style={{ padding: "32px 40px", display: "grid", gridTemplateColumns: "1fr 1fr", gap: 20, alignItems: "start" }}>
        <div style={{ ...glass(20), borderRadius: 24, padding: "36px 32px", position: "relative", overflow: "hidden" }}>
          <div style={{ position: "absolute", top: -40, right: -40, width: 200, height: 200, borderRadius: "50%", background: "radial-gradient(circle, rgba(30,77,63,.12) 0%, transparent 70%)", pointerEvents: "none" }} />
          <p style={{ fontSize: 10, letterSpacing: 3, color: T.moss, fontWeight: 800 }}>MOSS · MARBLE</p>
          <h1 style={{ fontFamily: "'Fraunces', serif", fontSize: 38, lineHeight: 1.1, margin: "14px 0 16px" }}>Editorial pace for<br />technical textiles.</h1>
          <p style={{ fontSize: 14, color: T.inkSoft, lineHeight: 1.7 }}>White fields, green discipline — the hero reads like a spread, not a slide.</p>
        </div>
        <div style={{ background: T.porcelain, boxShadow: neuIn, borderRadius: 24, padding: "32px 28px", marginTop: 40 }}>
          <p style={{ fontSize: 11, fontWeight: 700, color: T.brassDeep, marginBottom: 16 }}>MILL FACTS</p>
          {["25+ years", "500+ hotel programs", "40+ export markets"].map((t) => (
